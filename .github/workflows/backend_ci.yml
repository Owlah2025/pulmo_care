name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: pulmo_user
          POSTGRES_PASSWORD: pulmo_password
          POSTGRES_DB: pulmo_care
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio httpx python-jose[cryptography] passlib[bcrypt] pydantic-settings

      - name: Run Alembic migrations
        working-directory: backend
        env:
          POSTGRES_USER: pulmo_user
          POSTGRES_PASSWORD: pulmo_password
          POSTGRES_SERVER: localhost
          POSTGRES_DB: pulmo_care
        run: python -m alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_USER: pulmo_user
          POSTGRES_PASSWORD: pulmo_password
          POSTGRES_SERVER: localhost
          POSTGRES_DB: pulmo_care
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pulmo-care-backend ./backend
